<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ULTRA GURU MD - Fork Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0a0a, #0b0e1a, #07090f);
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('https://files.catbox.moe/5evber.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.08;
            z-index: 0;
            pointer-events: none;
        }

        .glow-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, rgba(255,215,0,0.03) 0%, transparent 70%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 560px;
            width: 100%;
            background: rgba(8, 12, 25, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 215, 0, 0.25);
            border: 1px solid rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
            text-align: center;
        }

        .premium-icon {
            font-size: 70px;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 12px #ffd700);
            animation: subtleGlow 2s infinite alternate;
        }

        @keyframes subtleGlow {
            0% { filter: drop-shadow(0 0 5px #ffd700); text-shadow: 0 0 5px #ffd700; }
            100% { filter: drop-shadow(0 0 20px #ffaa00); text-shadow: 0 0 20px #ffaa00; }
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FFB347, #FFD700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            letter-spacing: 2px;
            font-family: 'Orbitron', monospace;
        }

        .badge {
            display: inline-block;
            background: rgba(255,215,0,0.15);
            border: 1px solid rgba(255,215,0,0.5);
            border-radius: 60px;
            padding: 6px 18px;
            font-size: 12px;
            color: #FFD966;
            margin-bottom: 28px;
            backdrop-filter: blur(4px);
        }

        .subtitle {
            color: #a0b3d9;
            font-size: 15px;
            margin-bottom: 32px;
            border-bottom: 1px dashed rgba(255,215,0,0.3);
            padding-bottom: 16px;
        }

        .input-group {
            margin-bottom: 28px;
            text-align: left;
        }

        label {
            display: block;
            color: #FFD966;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .github-wrapper {
            display: flex;
            align-items: center;
            background: #0a0e1c;
            border: 1.5px solid #2a2f45;
            border-radius: 60px;
            transition: all 0.2s;
            overflow: hidden;
        }

        .github-wrapper:focus-within {
            border-color: #FFD700;
            box-shadow: 0 0 0 3px rgba(255,215,0,0.2);
        }

        .prefix {
            background: #11162a;
            padding: 14px 20px;
            color: #FFD966;
            font-weight: 500;
            border-right: 1px solid #2a2f45;
            font-family: monospace;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 18px;
            color: #fff;
            font-size: 16px;
            outline: none;
            font-family: monospace;
        }

        input::placeholder {
            color: #3e4a6b;
        }

        .verify-btn {
            width: 100%;
            background: linear-gradient(95deg, #1f2b4e, #0f1428);
            border: 1px solid rgba(255,215,0,0.6);
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 18px;
            color: #FFE6A3;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 18px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.4);
        }

        .verify-btn:hover {
            background: linear-gradient(95deg, #2a3b6e, #1a2140);
            border-color: #FFD700;
            transform: scale(1.01);
            box-shadow: 0 0 12px rgba(255,215,0,0.3);
            color: #FFE082;
        }

        .fork-btn {
            width: 100%;
            background: linear-gradient(95deg, #3a1f2e, #1f1020);
            border: 1px solid #ff7b2c;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 16px;
            color: #ffb347;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
        }

        .fork-btn:hover {
            background: linear-gradient(95deg, #552c3e, #2c1530);
            border-color: #ff9f4a;
            transform: scale(1.01);
        }

        .message-area {
            margin-top: 20px;
            padding: 12px;
            border-radius: 40px;
            font-size: 14px;
            display: none;
            font-weight: 500;
        }

        .error {
            background: rgba(220, 50, 50, 0.2);
            border: 1px solid #ff5e5e;
            color: #ffaeae;
            display: block;
        }

        .success {
            background: rgba(255, 215, 0, 0.12);
            border: 1px solid #FFD700;
            color: #FFE6A3;
            display: block;
        }

        .loading {
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid #ffd966;
            color: #ffe1a0;
            display: block;
        }

        .footer {
            margin-top: 32px;
            font-size: 11px;
            color: #6c7a9e;
            border-top: 1px solid rgba(255,215,0,0.2);
            padding-top: 20px;
        }

        .footer a {
            color: #FFD966;
            text-decoration: none;
            font-weight: 500;
        }

        @media (max-width: 500px) {
            .container { padding: 32px 20px; }
            h1 { font-size: 26px; }
            .premium-icon { font-size: 55px; }
        }
    </style>
</head>
<body>
<div class="glow-overlay"></div>
<div class="container">
    <div class="premium-icon">🎖️</div>
    <h1>ULTRA GURU MD</h1>
    <div class="badge">✦ PREMIUM FORK VERIFICATION ✦</div>
    <div class="subtitle">Verify your fork to unlock ultra deployment</div>

    <div class="input-group">
        <label>⚡ GITHUB USERNAME</label>
        <div class="github-wrapper">
            <span class="prefix">github.com/</span>
            <input type="text" id="githubUsername" placeholder="GuruhTech" autocomplete="off">
        </div>
    </div>

    <button class="verify-btn" id="verifyBtn">
        <span>🔱</span> VERIFY & DEPLOY
    </button>

    <div id="messageArea" class="message-area"></div>

    <div id="forkButtonContainer" style="display: none;">
        <button class="fork-btn" id="forkNowBtn">
            <span>🍴</span> FORK ULTRA GURU REPOSITORY
        </button>
        <p style="font-size: 12px; margin-top: 12px; color: #7c8ab0;">
            You must fork the repo before deploying
        </p>
    </div>

    <div class="footer">
        ⚡ <a href="https://github.com/GuruhTech/ULTRA-GURU" target="_blank">ULTRA GURU MD</a> | 
        Powered by <a href="https://github.com/GuruhTech" target="_blank">GURUTECH LAB</a> 🎖️
    </div>
</div>

<script>
    const REPO_OWNER = "GuruhTech";
    const REPO_NAME = "ULTRA-GURU";
    const HEROKU_URL = `https://heroku.com/deploy?template=https://github.com/${REPO_OWNER}/${REPO_NAME}`;

    const usernameInput = document.getElementById('githubUsername');
    const verifyBtn = document.getElementById('verifyBtn');
    const messageDiv = document.getElementById('messageArea');
    const forkContainer = document.getElementById('forkButtonContainer');

    function showMessage(msg, type) {
        messageDiv.innerHTML = msg;
        messageDiv.className = `message-area ${type}`;
        if (type !== 'loading') {
            setTimeout(() => {
                messageDiv.className = 'message-area';
            }, 4000);
        }
    }

    async function checkFork(username) {
        if (!username) {
            showMessage('❌ Please enter your GitHub username', 'error');
            return false;
        }

        showMessage(`🔍 Verifying elite access for @${username} ...`, 'loading');
        forkContainer.style.display = 'none';

        try {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/forks?per_page=100`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('GitHub API error');

            const forks = await res.json();
            const hasForked = forks.some(f => f.owner && f.owner.login.toLowerCase() === username.toLowerCase());

            if (hasForked) {
                showMessage(`✅ ACCESS GRANTED — Redirecting to Heroku ultra deployment`, 'success');
                setTimeout(() => {
                    window.location.href = HEROKU_URL;
                }, 1500);
                return true;
            } else {
                showMessage(`⚠️ @${username} has not forked ULTRA GURU. Fork required for deployment.`, 'error');
                forkContainer.style.display = 'block';
                return false;
            }
        } catch (err) {
            showMessage('🌐 Verification error — please try again later', 'error');
            return false;
        }
    }

    verifyBtn.addEventListener('click', () => {
        const user = usernameInput.value.trim();
        checkFork(user);
    });

    document.getElementById('forkNowBtn').addEventListener('click', () => {
        window.open(`https://github.com/${REPO_OWNER}/${REPO_NAME}/fork`, '_blank');
        showMessage('🍴 Fork the repo, then press VERIFY again.', 'success');
        forkContainer.style.display = 'none';
    });

    usernameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') verifyBtn.click();
    });
</script>
</body>
</html>
